<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arianne!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Spotify-Like Music Player -->
    <audio id="birthdayMusic" loop preload="auto" autoplay muted>
        <source src="wave to earth - love. (Clean Inst.) - BΞRGHUI.mp3" type="audio/mp3">
        <source src="wave to earth - love. (Clean Inst.) - BΞRGHUI.mp3" type="audio/mp3">
        <!-- Fallback: You can replace with your own music file -->
        <!-- For local files, download a birthday song and place it in the same folder with one of the names above -->
        Your browser does not support the audio element.
    </audio>

    <!-- Spotify-Style Player Card -->
    <div class="music-player" id="musicPlayer">
        <div class="player-header">
            <span class="player-title">Now Playing</span>
            <button class="player-close" onclick="toggleMusicPlayer()" title="Minimize player">
                ✕
            </button>
        </div>

        <div class="player-info">
            <div class="song-name" id="songName">love.</div>
            <div class="song-artist" id="songArtist">wave to earth</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" id="prevBtn" title="Previous">
                ⏮️
            </button>
            <button class="control-btn play-btn" id="playBtn" title="Play/Pause">
                ▶️
            </button>
            <button class="control-btn" id="nextBtn" title="Next">
                ⏭️
            </button>
        </div>

        <div class="volume-container">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30" title="Volume">
        </div>
    </div>

    <div id="audioHint" style="position: fixed; bottom: 400px; right: 20px; z-index: 90; background: rgba(0, 0, 0, 0.6); color: #fff; padding: 0.4rem 0.7rem; border-radius: 8px; font-size: 0.8rem; display: none;">Click to enable sound</div>

    <div class="main-container">
        <h1 class="birthday-message" role="banner" aria-label="Happy Birthday message">
            🎉 HAPPY BIRTHDAY ARIANNEEE!!!🫶🥳🎉
        </h1>

        <button class="secret-button" onclick="openPasswordModal()"
                aria-label="Open secret message (password required)">
            💜 Message 💜
        </button>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="modal" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-content">
            <h2 id="modal-title">Enter Password</h2>
            <div class="password-input-wrapper" style="margin-bottom: 1.5rem;">
                <input type="password" id="passwordInput" class="password-input"
                       placeholder="Input Password..." maxlength="20"
                       aria-label="Password input">
                <button id="togglePassword" type="button" class="btn btn-secondary">
                    Show
                </button>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="checkPassword()">Open</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>


    <div id="secretMessage" class="secret-message" role="alert" aria-live="polite">
        <h3>Happy Birthday Arianne!</h3>
        <div class="hearts" aria-hidden="true">💜💖💜💖💜</div>
        <p>
            (Message)
        </p>
        <div class="hearts" aria-hidden="true">💜💖💜💖💜</div>
        <button class="btn btn-primary" onclick="closeSecret()" style="margin-top: 2rem;">
            ✨ Close ✨
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
