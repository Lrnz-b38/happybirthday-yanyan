<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arianne!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 25%, #c084fc 50%, #d8b4fe 75%, #e9d5ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: sparkle 20s linear infinite;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes sparkle {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 800px;
            min-height: 70vh;
            padding: 2rem;
        }

        .birthday-message {
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 3rem;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.2;
            text-shadow: 
                0 0 20px rgba(139, 92, 246, 0.6),
                0 0 40px rgba(167, 139, 250, 0.4),
                0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes glow {
            from { 
                text-shadow: 0 0 20px rgba(139, 92, 246, 0.5), 0 0 30px rgba(167, 139, 250, 0.4);
            }
            to { 
                text-shadow: 0 0 30px rgba(139, 92, 246, 0.8), 0 0 40px rgba(167, 139, 250, 0.6), 0 0 50px rgba(192, 132, 252, 0.4);
            }
        }

        .secret-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: auto;
            transform: none;
            background: linear-gradient(145deg, #a78bfa, #8b5cf6);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 
                0 15px 35px rgba(139, 92, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: bounceInUp 1.2s ease-out 0.8s forwards;
            min-width: 220px;
            z-index: 300;
        }

        .secret-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 700px;
            z-index: 200;
            display: none;
            background: linear-gradient(145deg, #fff1f2, #fce7f3);
            padding: clamp(2rem, 6vw, 4rem);
            border-radius: 30px;
            margin: 0 auto;
            border: 4px solid #fbb6ce;
            box-shadow: 0 25px 50px rgba(251, 182, 206, 0.4);
            animation: reveal 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes bounceInUp {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(50px) scale(0.8);
            }
            60% {
                opacity: 1;
                transform: translateX(-50%) translateY(-10px) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        .secret-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 20px 45px rgba(139, 92, 246, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
        }

        .secret-button:active {
            transform: translateY(-2px) scale(1);
        }

        /* Music Control - Spotify Style Player */
        .music-player {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px;
            width: 280px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-player.minimized {
            width: 60px;
            height: 60px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .player-title {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .player-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-close:hover {
            color: rgba(255, 255, 255, 1);
            transform: rotate(90deg);
        }

        .music-player.minimized .player-header,
        .music-player.minimized .player-info,
        .music-player.minimized .progress-container,
        .music-player.minimized .player-controls,
        .music-player.minimized .volume-container {
            display: none;
        }

        .player-info {
            margin-bottom: 12px;
            text-align: center;
        }

        .song-name {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-artist {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-container {
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1DB954, #1ed760);
            border-radius: 1px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.08);
        }

        .play-btn {
            background: linear-gradient(135deg, #1DB954, #1ed760);
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
        }

        .play-btn:hover {
            background: linear-gradient(135deg, #1ed760, #2ee870);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.35);
        }

        .play-btn:active {
            transform: scale(0.93);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }

        .volume-icon {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            min-width: 18px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(29, 185, 84, 0.4);
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(29, 185, 84, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .music-player {
                width: 270px;
                top: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .music-player {
                width: 260px;
                padding: 12px;
                top: 15px;
                right: 15px;
            }

            .control-btn {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }

            .play-btn {
                width: 42px;
                height: 42px;
                font-size: 1.2rem;
            }
        }

        /* Password Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-content {
            background: linear-gradient(145deg, #f8fafc, #e2e8f0);
            padding: clamp(2rem, 5vw, 4rem);
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 3px solid rgba(139, 92, 246, 0.4);
            animation: modalSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h2 {
            color: #6b46c1;
            margin-bottom: 1.5rem;
            font-size: clamp(1.5rem, 4vw, 2rem);
        }

        .password-input {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            border: 3px solid #d8b4fe;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            font-weight: 500;
        }

        .password-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            transform: scale(1.02);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            min-width: 140px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #e2e8f0, #cbd5e0);
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: linear-gradient(145deg, #cbd5e0, #a0aec0);
            transform: translateY(-3px);
        }

        /* Secret Message */
        .secret-message {
            display: none;
            background: linear-gradient(145deg, #fff1f2, #fce7f3);
            padding: clamp(2rem, 6vw, 4rem);
            border-radius: 30px;
            margin: 2rem 0;
            border: 4px solid #fbb6ce;
            box-shadow: 0 25px 50px rgba(251, 182, 206, 0.4);
            animation: reveal 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 700px;
            width: 100%;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .secret-message h3 {
            color: #be185d;
            font-size: clamp(1.4rem, 4vw, 2rem);
            margin-bottom: 1.5rem;
        }

        .secret-message p {
            color: #4c1d95;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .hearts {
            font-size: clamp(2rem, 6vw, 3rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            margin: 1.5rem 0;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .main-container {
                min-height: 60vh;
                padding: 1rem;
            }
            
            .secret-button {
                position: relative;
                bottom: auto;
                margin-top: 2rem;
                width: 100%;
                max-width: 300px;
            }
            
            .modal-buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .birthday-message {
                margin-bottom: 2rem;
            }
            
            .secret-button {
                padding: 20px 30px;
                font-size: 1.1rem;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .secret-button, .btn-primary {
                border: 3px solid #ffffff;
            }
            
            .password-input {
                border-width: 3px;
            }
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus visible for keyboard navigation */
        .secret-button:focus,
        .btn:focus,
        .password-input:focus,
        .music-control:focus {
            outline: 4px solid #ffffff;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
    <!-- Spotify-Like Music Player -->
    <audio id="birthdayMusic" loop preload="auto" autoplay muted>
        <source src="wave to earth - love. (Clean Inst.) - BΞRGHUI.mp3" type="audio/mp3">
        <source src="wave to earth - love. (Clean Inst.) - BΞRGHUI.mp3" type="audio/mp3">
        <!-- Fallback: You can replace with your own music file -->
        <!-- For local files, download a birthday song and place it in the same folder with one of the names above -->
        Your browser does not support the audio element.
    </audio>

    <!-- Spotify-Style Player Card -->
    <div class="music-player" id="musicPlayer">
        <div class="player-header">
            <span class="player-title">Now Playing</span>
            <button class="player-close" onclick="toggleMusicPlayer()" title="Minimize player">
                ✕
            </button>
        </div>

        <div class="player-info">
            <div class="song-name" id="songName">love.</div>
            <div class="song-artist" id="songArtist">wave to earth</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" id="prevBtn" title="Previous">
                ⏮️
            </button>
            <button class="control-btn play-btn" id="playBtn" title="Play/Pause">
                ▶️
            </button>
            <button class="control-btn" id="nextBtn" title="Next">
                ⏭️
            </button>
        </div>

        <div class="volume-container">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30" title="Volume">
        </div>
    </div>

    <div id="audioHint" style="position: fixed; bottom: 400px; right: 20px; z-index: 90; background: rgba(0, 0, 0, 0.6); color: #fff; padding: 0.4rem 0.7rem; border-radius: 8px; font-size: 0.8rem; display: none;">Click to enable sound</div>

    <div class="main-container">
        <h1 class="birthday-message" role="banner" aria-label="Happy Birthday message">
            🎉 HAPPY BIRTHDAY ARIANNEEE!!!🫶🥳🎉
        </h1>
        
        <button class="secret-button" onclick="openPasswordModal()" 
                aria-label="Open secret message (password required)">
            💜 Message 💜
        </button>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="modal" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-content">
            <h2 id="modal-title">Enter Password</h2>
            <div style="position: relative; width: 100%; margin-bottom: 1.5rem;">
                <input type="password" id="passwordInput" class="password-input"
                       placeholder="Input Password..." maxlength="20"
                       aria-label="Password input">
                <button id="togglePassword" type="button" class="btn btn-secondary"
                        style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); padding: 0.4rem 0.8rem; font-size: 0.9rem;">
                    Show
                </button>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="checkPassword()">Open</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    
    <div id="secretMessage" class="secret-message" role="alert" aria-live="polite">
        <h3>Happy Birthday Arianne!</h3>
        <div class="hearts" aria-hidden="true">💜💖💜💖💜</div>
        <p>
            (Message)
        </p>
        <div class="hearts" aria-hidden="true">💜💖💜💖💜</div>
        <button class="btn btn-primary" onclick="closeSecret()" style="margin-top: 2rem;">
            ✨ Close ✨
        </button>
    </div>

    <script>
        const PASSWORD = "love. wave to earth"; // 👈 CHANGE THIS TO YOUR PASSWORD
        const SECRET_MODAL = document.getElementById('passwordModal');
        const SECRET_MESSAGE = document.getElementById('secretMessage');
        const PASSWORD_INPUT = document.getElementById('passwordInput');
        const TOGGLE_PASSWORD = document.getElementById('togglePassword');
        const MUSIC_HINT = document.getElementById('audioHint');
        const MUSIC = document.getElementById('birthdayMusic');
        
        // Music Player Elements
        const MUSIC_PLAYER = document.getElementById('musicPlayer');
        const PLAY_BTN = document.getElementById('playBtn');
        const PREV_BTN = document.getElementById('prevBtn');
        const NEXT_BTN = document.getElementById('nextBtn');
        const PROGRESS_BAR = document.getElementById('progressBar');
        const PROGRESS_FILL = document.getElementById('progressFill');
        const CURRENT_TIME = document.getElementById('currentTime');
        const DURATION = document.getElementById('duration');
        const VOLUME_SLIDER = document.getElementById('volumeSlider');
        const VOLUME_ICON = document.getElementById('volumeIcon');
        const SONG_NAME = document.getElementById('songName');
        const SONG_ARTIST = document.getElementById('songArtist');

        let musicPlaying = false;
        let playerMinimized = false;

        // Format time helper
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Update progress bar
        function updateProgress() {
            const progressFill = document.getElementById('progressFill');
            const currentTime = document.getElementById('currentTime');
            const duration = document.getElementById('duration');
            
            if (progressFill && currentTime && duration && MUSIC && MUSIC.duration) {
                const percentage = (MUSIC.currentTime / MUSIC.duration) * 100;
                progressFill.style.width = percentage + '%';
                currentTime.textContent = formatTime(MUSIC.currentTime);
                duration.textContent = formatTime(MUSIC.duration);
            }
        }

        // Reattach all player event listeners
        function reattachPlayerListeners() {
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressBar = document.getElementById('progressBar');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            const duration = document.getElementById('duration');

            if (progressBar) {
                progressBar.addEventListener('click', (e) => {
                    if (!MUSIC || !MUSIC.duration) return;
                    const rect = progressBar.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    MUSIC.currentTime = percent * MUSIC.duration;
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    const volume = e.target.value / 100;
                    MUSIC.volume = volume;
                    
                    if (volume === 0) {
                        volumeIcon.textContent = '🔇';
                    } else if (volume < 0.5) {
                        volumeIcon.textContent = '🔉';
                    } else {
                        volumeIcon.textContent = '🔊';
                    }
                });
            }

            if (playBtn) {
                playBtn.addEventListener('click', () => {
                    if (musicPlaying) {
                        MUSIC.pause();
                        musicPlaying = false;
                        playBtn.textContent = '▶️';
                    } else {
                        MUSIC.play().then(() => {
                            musicPlaying = true;
                            playBtn.textContent = '⏸️';
                        }).catch(() => {
                            alert('Please allow audio in your browser settings 🎵');
                        });
                    }
                });
            }

            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    MUSIC.currentTime = 0;
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (MUSIC.duration) {
                        MUSIC.currentTime = MUSIC.duration - 1;
                    }
                });
            }

            if (duration) {
                const updateDuration = () => {
                    duration.textContent = formatTime(MUSIC.duration);
                };
                MUSIC.removeEventListener('loadedmetadata', updateDuration);
                MUSIC.addEventListener('loadedmetadata', updateDuration);
            }
        }

        // Toggle player minimized state
        window.toggleMusicPlayer = function() {
            playerMinimized = !playerMinimized;
            if (playerMinimized) {
                MUSIC_PLAYER.classList.add('minimized');
                MUSIC_PLAYER.innerHTML = '<button onclick="window.toggleMusicPlayer()" style="background: linear-gradient(135deg, #1DB954, #1ed760); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;" onmouseover="this.style.transform=\'scale(1.1)\'; this.style.boxShadow=\'0 6px 20px rgba(29, 185, 84, 0.35)\'" onmouseout="this.style.transform=\'scale(1)\'; this.style.boxShadow=\'none\'">🎵</button>';
            } else {
                // Restore full player without reloading
                playerMinimized = false;
                MUSIC_PLAYER.classList.remove('minimized');
                MUSIC_PLAYER.innerHTML = '';
                MUSIC_PLAYER.innerHTML = `
                    <div class="player-header">
                        <span class="player-title">Now Playing</span>
                        <button class="player-close" onclick="toggleMusicPlayer()" title="Minimize player">✕</button>
                    </div>
                    <div class="player-info">
                        <div class="song-name" id="songName">🎵 Birthday Song</div>
                        <div class="song-artist" id="songArtist">wave to earth - love.</div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="time-info">
                            <span id="currentTime">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    <div class="player-controls">
                        <button class="control-btn" id="prevBtn" title="Previous">⏮️</button>
                        <button class="control-btn play-btn" id="playBtn" title="Play/Pause">▶️</button>
                        <button class="control-btn" id="nextBtn" title="Next">⏭️</button>
                    </div>
                    <div class="volume-container">
                        <span class="volume-icon" id="volumeIcon">🔊</span>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30" title="Volume" />
                    </div>
                `;
                // Re-attach event listeners
                reattachPlayerListeners();
            }
        };

        // 🎵 Music Autoplay with User Interaction Fallback
        function initMusic() {
            if (!MUSIC) return;

            MUSIC.volume = 0.3; // Lower volume for background
            MUSIC.preload = 'auto';
            MUSIC.muted = true;

            // Ensure source is loaded
            MUSIC.load();

            // Try autoplay immediately (muted) in modern browsers
            const playPromise = MUSIC.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // Autoplay worked in muted mode
                    musicPlaying = true;
                    const playBtn = document.getElementById('playBtn');
                    if (playBtn) playBtn.textContent = '⏸️';
                    MUSIC_HINT.style.display = 'none';
                }).catch(() => {
                    // Autoplay blocked, show user hint
                    musicPlaying = false;
                    const playBtn = document.getElementById('playBtn');
                    if (playBtn) playBtn.textContent = '▶️';
                    MUSIC_HINT.style.display = 'block';
                });
            }

            // If the user interacts, unmute and play (needed in strict autoplay policies)
            const unlockAudio = () => {
                enableAudio();
                MUSIC_HINT.style.display = 'none';
                window.removeEventListener('click', unlockAudio);
                window.removeEventListener('touchstart', unlockAudio);
            };
            window.addEventListener('click', unlockAudio);
            window.addEventListener('touchstart', unlockAudio);
        }

        MUSIC.addEventListener('error', () => {
            const playBtn = document.getElementById('playBtn');
            if (playBtn) {
                playBtn.textContent = '❌';
                playBtn.title = 'Audio file not found';
            }
            alert('Music did not load. Please check if the mp3 file is available in the same folder.');
        });

        // Enable unmuted audio after start and user interaction (browser policies)
        function enableAudio() {
            if (MUSIC) {
                MUSIC.muted = false;
                MUSIC.volume = 0.3;
                const playPromise = MUSIC.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        musicPlaying = true;
                        const playBtn = document.getElementById('playBtn');
                        if (playBtn) playBtn.textContent = '⏸️';
                        MUSIC_HINT.style.display = 'none';
                    }).catch(() => {
                        // handle play refusal silently; users can use control button
                    });
                }
            }
        }

        // Secret message modal handling
        function openPasswordModal() {
            SECRET_MODAL.style.display = 'flex';
            SECRET_MODAL.setAttribute('aria-hidden', 'false');
            PASSWORD_INPUT.value = '';
            PASSWORD_INPUT.focus();
        }

        function closeModal() {
            SECRET_MODAL.style.display = 'none';
            SECRET_MODAL.setAttribute('aria-hidden', 'true');
            PASSWORD_INPUT.value = '';
            PASSWORD_INPUT.style.borderColor = '#d8b4fe';
            PASSWORD_INPUT.style.boxShadow = 'none';
        }

        function checkPassword() {
            const input = PASSWORD_INPUT.value.trim().toLowerCase();
            if (input === PASSWORD.toLowerCase()) {
                SECRET_MODAL.style.display = 'none';
                SECRET_MODAL.setAttribute('aria-hidden', 'true');
                SECRET_MESSAGE.style.display = 'block';
                PASSWORD_INPUT.value = '';
            } else {
                PASSWORD_INPUT.style.borderColor = '#ef4444';
                PASSWORD_INPUT.style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.3)';
                PASSWORD_INPUT.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    PASSWORD_INPUT.style.borderColor = '#d8b4fe';
                    PASSWORD_INPUT.style.boxShadow = 'none';
                    PASSWORD_INPUT.style.animation = '';
                }, 500);
            }
        }

        PASSWORD_INPUT.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        window.addEventListener('click', function (event) {
            if (event.target === SECRET_MODAL) {
                closeModal();
            }
        });

        function closeSecret() {
            SECRET_MESSAGE.style.display = 'none';
        }

        // Toggle password visibility
        TOGGLE_PASSWORD.addEventListener('click', function () {
            if (PASSWORD_INPUT.type === 'password') {
                PASSWORD_INPUT.type = 'text';
                TOGGLE_PASSWORD.textContent = 'Hide';
            } else {
                PASSWORD_INPUT.type = 'password';
                TOGGLE_PASSWORD.textContent = 'Show';
            }
            PASSWORD_INPUT.focus();
        });

        // Initialize music interaction
        initMusic();
        reattachPlayerListeners();
        MUSIC.addEventListener('timeupdate', updateProgress);

        window.addEventListener('click', enableAudio, { once: true });
        window.addEventListener('touchstart', enableAudio, { once: true });
    </script>
</body>
</html>
